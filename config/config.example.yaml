llm:
  provider: openai
  base_url: https://ark-cn-beijing.bytedance.net/api/v3
  model: ep-xxxxxxxxxxxxxxxxxxxxxxxx
  api_key: YOUR_API_KEY

embedding:
  provider: ark_multimodal
  base_url: https://ark-cn-beijing.bytedance.net/api/v3
  model: ep-xxxxxxxxxxxxxxxxxxxxxxxx
  api_key: YOUR_API_KEY
  dim: 2048

database:
  url: postgresql://postgres:password@localhost:5432/simplememory

mirix:
  api_key: YOUR_MIRIX_API_KEY
  base_url: http://localhost:8531

# Fornax LLM backend (alternative to OpenAI-compatible Ark)
# To use Fornax, set llm.provider: fornax and fill in the fields below.
# fornax:
#   llm:
#     provider: fornax
#     fornax_ak: YOUR_FORNAX_AK
#     fornax_sk: YOUR_FORNAX_SK
#     fornax_prompt_key: lark.memo.main

amem:
  chroma_base: out/amem/chroma
  model_name: all-MiniLM-L6-v2
  enable_evolution: true
  evo_threshold: 100
